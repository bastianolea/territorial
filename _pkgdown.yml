url: https://bastianolea.github.io/territorial/
lang: es
template:
  bootstrap: 5
reference:
- title: Datos territoriales
  desc:  Funciones y tablas de datos que entregan datos de uso territorial
  contents:
  - territorios
  - comunas
  - regiones
  - clasificacion
  - contextualizar

- title: Evaluación de unidades territoriales
  desc: Funciones que permiten probar la calidad de los datos, o pueden ser usados para lógica condicional
  contents:
  - starts_with("is_")
  - starts_with("validar")

- title: Limpieza y corrección de territorios
  desc: Funciones para transformar datos de identificación de territorios, ordenarlos, etc.
  contents:
  - starts_with("as_")
  - starts_with("ordenar_")
  - ubicar_comunas
  - starts_with("limpiar_")

- title: Complementar nombres de territorios
  desc: Funciones que toman los nombres de territorios y hacen más cosas con ellos
  contents:
  - preposicion_region
  - starts_with("redactar_")
  - starts_with("abreviar_")

- title: Complementar datos territoriales
  desc: Funciones para agregar nuevas variables a partir de datos territoriales existentes
  contents:
  - agregar_clasificacion
